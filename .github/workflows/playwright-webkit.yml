name: Playwright Tests on WebKit
on: [push, pull_request]
jobs:
  test-webkit:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    name: WebKit (${{ matrix.adapter }} - shard ${{ matrix.shard }} of 4)
    timeout-minutes: 15
    runs-on: macos-15
    strategy:
      matrix:
        adapter: ['vue', 'react', 'svelte']
        shard: ['1', '2', '3', '4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Inertia
        run: pnpm -r --filter ./packages/core --filter ./packages/${{ matrix.adapter }}* build

      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('playwright/package.json').version)")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-webkit-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm playwright install --with-deps webkit

      - name: Install Playwright Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps webkit

      - name: Run Playwright Tests
        run: pnpm test:${{ matrix.adapter }} --webkit --shard=${{ matrix.shard }}/4

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-screenshots-${{ matrix.adapter }}-webkit-shard-${{ matrix.shard }}
          path: test-results
