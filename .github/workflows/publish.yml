name: Publish Packages

on:
  release:
    types: [released, prereleased]

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        adapter: ['core', 'vue3', 'react', 'svelte']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit

      - name: 'Build ${{ matrix.adapter }}'
        run: pnpm -r --filter ./packages/core --filter ./packages/${{ matrix.adapter }} build

      - name: 'Publish ${{ matrix.adapter }} to npm'
        run: cd "./packages/${{ matrix.adapter }}" && pnpm publish --no-git-checks --tag legacy
